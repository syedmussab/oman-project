<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Media - Oman Castles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oman-blue': '#1a5276',
                        'oman-gold': '#d4af37'
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-gradient-to-r from-oman-blue to-blue-800 text-white py-6 text-center">
        <h1 class="text-3xl font-bold">📤 Upload Media - Oman Castles</h1>
        <p class="mt-2">Upload images and videos</p>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <!-- Upload Form -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">Select Files</h2>
            
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-oman-blue transition mb-4">
                <i class="fas fa-cloud-upload-alt text-5xl text-gray-300 mb-4"></i>
                <p class="text-lg text-gray-600">Click to select files</p>
                <p class="text-sm text-gray-400">or drag and drop here</p>
                <input type="file" id="fileInput" accept="image/*,video/*" multiple class="hidden" onchange="handleFiles(this.files)">
            </div>

            <div id="fileList" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4"></div>

            <button onclick="document.getElementById('fileInput').click()" class="w-full py-3 bg-oman-blue text-white font-bold rounded-lg hover:bg-blue-700">
                📂 Choose Files
            </button>
        </div>

        <!-- Preview -->
        <div id="previewArea" class="bg-white rounded-2xl shadow-lg p-6 mt-4 hidden">
            <h2 class="text-xl font-bold mb-4">Preview</h2>
            <div id="previewContent" class="space-y-4"></div>
            <button onclick="clearAll()" class="mt-4 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                🗑️ Clear All
            </button>
        </div>

        <!-- Download -->
        <div id="downloadArea" class="bg-white rounded-2xl shadow-lg p-6 mt-4 hidden">
            <h2 class="text-xl font-bold mb-4">Save Files</h2>
            <button onclick="downloadAll()" class="w-full py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700">
                ⬇️ Download All
            </button>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let fileUrls = [];

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            uploadedFiles = [];
            fileUrls = [];

            Array.from(files).forEach((file, index) => {
                uploadedFiles.push(file);
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileUrls[index] = e.target.result;
                    displayFile(file, e.target.result, index);
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('previewArea').classList.remove('hidden');
            document.getElementById('downloadArea').classList.remove('hidden');
        }

        function displayFile(file, url, index) {
            const div = document.createElement('div');
            div.className = 'bg-gray-100 rounded-lg p-2 text-center';
            
            if (file.type.startsWith('image/')) {
                div.innerHTML = `<img src="${url}" class="w-full h-32 object-cover rounded mb-2"><p class="text-xs truncate">${file.name}</p>`;
            } else if (file.type.startsWith('video/')) {
                div.innerHTML = `<video src="${url}" class="w-full h-32 object-cover rounded mb-2"></video><p class="text-xs truncate">${file.name}</p>`;
            }
            
            document.getElementById('fileList').appendChild(div);
        }

        function clearAll() {
            uploadedFiles = [];
            fileUrls = [];
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('previewArea').classList.add('hidden');
            document.getElementById('downloadArea').classList.add('hidden');
            document.getElementById('fileInput').value = '';
        }

        function downloadAll() {
            fileUrls.forEach((url, index) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = uploadedFiles[index].name;
                link.click();
            });
        }
    </script>
</body>
</html>
