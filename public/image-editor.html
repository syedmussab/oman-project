<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor - Oman Castles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oman-blue': '#1a5276',
                        'oman-gold': '#d4af37',
                        'oman-dark': '#2c3e50'
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-gradient-to-r from-oman-blue to-blue-800 text-white py-6">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">🎨 Image Editor</h1>
                <p class="mt-1">Apply filters to your images</p>
            </div>
            <a href="index-en.html" class="px-4 py-2 bg-white/20 rounded hover:bg-white/30">← Back to Home</a>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4">
        <!-- Image Editor -->
        <div class="bg-white rounded-xl p-6 shadow-lg">
            <p class="text-gray-600 mb-6">Upload an image and apply filters</p>
            
            <!-- Upload -->
            <div class="mb-4">
                <label class="block font-bold mb-2">📤 Upload Image</label>
                <input type="file" id="editorInput" accept="image/*" onchange="loadEditorImage(event)" class="w-full border p-2 rounded">
            </div>
            
            <!-- Canvas -->
            <div class="mb-4 text-center">
                <canvas id="editorCanvas" class="max-w-full max-h-96 mx-auto border rounded bg-gray-100"></canvas>
            </div>
            
            <!-- Filter Buttons -->
            <div class="grid grid-cols-3 md:grid-cols-6 gap-2 mb-4">
                <button onclick="applyFilter('original')" class="py-2 px-3 bg-gray-200 rounded hover:bg-gray-300">📷 Original</button>
                <button onclick="applyFilter('bright')" class="py-2 px-3 bg-yellow-100 rounded hover:bg-yellow-200">☀️ Bright</button>
                <button onclick="applyFilter('dark')" class="py-2 px-3 bg-gray-800 text-white rounded hover:bg-gray-900">🌙 Dark</button>
                <button onclick="applyFilter('warm')" class="py-2 px-3 bg-orange-100 rounded hover:bg-orange-200">🔥 Warm</button>
                <button onclick="applyFilter('cool')" class="py-2 px-3 bg-blue-100 rounded hover:bg-blue-200">❄️ Cool</button>
                <button onclick="applyFilter('vintage')" class="py-2 px-3 bg-amber-100 rounded hover:bg-amber-200">📽️ Vintage</button>
                <button onclick="applyFilter('gold')" class="py-2 px-3 bg-yellow-200 rounded hover:bg-yellow-300">✨ Gold</button>
                <button onclick="applyFilter('dramatic')" class="py-2 px-3 bg-purple-100 rounded hover:bg-purple-200">🌈 Dramatic</button>
                <button onclick="applyFilter('bw')" class="py-2 px-3 bg-gray-400 text-white rounded hover:bg-gray-500">⬛ B&W</button>
                <button onclick="applyFilter('sharpen')" class="py-2 px-3 bg-red-100 rounded hover:bg-red-200">🔪 Sharpen</button>
                <button onclick="applyFilter('blur')" class="py-2 px-3 bg-cyan-100 rounded hover:bg-cyan-200">🌫️ Soft</button>
                <button onclick="applyFilter('pop')" class="py-2 px-3 bg-pink-100 rounded hover:bg-pink-200">🎨 Pop</button>
            </div>
            
            <!-- Action Buttons -->
            <div class="flex gap-2">
                <button onclick="resetEditor()" class="flex-1 py-2 bg-gray-200 rounded font-bold hover:bg-gray-300">🔄 Reset</button>
                <button onclick="saveEditorImage()" class="flex-1 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700">💾 Save</button>
            </div>
        </div>
    </div>

    <script>
        let editorImg = null;
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        
        function loadEditorImage(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                editorImg = new Image();
                editorImg.onload = function() {
                    resizeAndDraw();
                };
                editorImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function resizeAndDraw() {
            let w = editorImg.width, h = editorImg.height;
            if(w > 600) { h = (600/w)*h; w = 600; }
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(editorImg, 0, 0, w, h);
        }
        
        function applyFilter(type) {
            if(!editorImg) { alert('Upload image first!'); return; }
            resizeAndDraw();
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = data.data;
            
            for(let i = 0; i < pixels.length; i += 4) {
                let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                
                switch(type) {
                    case 'bright':
                        r = Math.min(255, r + 30); g = Math.min(255, g + 30); b = Math.min(255, b + 30);
                        break;
                    case 'dark':
                        r = Math.max(0, r - 40); g = Math.max(0, g - 40); b = Math.max(0, b - 40);
                        break;
                    case 'warm':
                        r = Math.min(255, r + 25); b = Math.max(0, b - 15);
                        break;
                    case 'cool':
                        r = Math.max(0, r - 15); b = Math.min(255, b + 25);
                        link = b;
                        break;
                    case 'vintage':
                        r = Math.min(255, r + 20); g = Math.min(255, g + 10); b = Math.max(0, b - 20);
                        break;
                    case 'gold':
                        if(g > 80 && r > 120) { g = Math.min(255, g + 30); r = Math.min(255, r + 20); }
                        break;
                    case 'dramatic':
                        r = r > 128 ? Math.min(255, r + 40) : Math.max(0, r - 40);
                        g = g > 128 ? Math.min(255, g + 40) : Math.max(0, g - 40);
                        b = b > 128 ? Math.min(255, b + 40) : Math.max(0, b - 40);
                        break;
                    case 'bw':
                        const gray = 0.2989*r + 0.5870*g + 0.1140*b;
                        r = g = b = gray;
                        break;
                    case 'sharpen':
                        const avg = (r + g + b) / 3;
                        r = Math.max(0, Math.min(255, r + (r - avg) * 0.3));
                        g = Math.max(0, Math.min(255, g + (g - avg) * 0.3));
                        b = Math.max(0, Math.min(255, b + (b - avg) * 0.3));
                        break;
                    case 'blur':
                        r = g = b = (r + g + b) / 3;
                        break;
                    case 'pop':
                        r = Math.min(255, r * 1.3); g = Math.min(255, g * 1.3); b = Math.min(255, b * 0.8);
                        break;
                }
                pixels[i] = r; pixels[i+1] = g; pixels[i+2] = b;
            }
            ctx.putImageData(data, 0, 0);
        }
        
        function resetEditor() {
            if(editorImg) resizeAndDraw();
        }
        
        function saveEditorImage() {
            if(!editorImg) { alert('No image to save!'); return; }
            const link = document.createElement('a');
            link.download = 'edited-image.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }
    </script>
</body>
</html>
