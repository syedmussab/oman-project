<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor - Oman Castles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-blue-700 text-white py-4">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">🎨 Image Editor</h1>
            <a href="upload-image.html" class="px-3 py-1 bg-white/20 rounded">← Back</a>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4">
        <!-- Upload -->
        <div class="bg-white rounded-xl p-6 mb-4">
            <label class="block mb-2 font-bold">📤 Upload Image</label>
            <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)" class="w-full border p-2 rounded">
        </div>

        <!-- Editor -->
        <div id="editor" class="bg-white rounded-xl p-6 hidden">
            <!-- Preview -->
            <div class="mb-4 text-center">
                <canvas id="canvas" class="max-w-full max-h-96 mx-auto border rounded"></canvas>
            </div>

            <!-- Controls -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div>
                    <label class="block text-sm font-bold mb-1">☀️ Brightness</label>
                    <input type="range" id="brightness" min="-100" max="100" value="0" oninput="editImage()" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">◐ Contrast</label>
                    <input type="range" id="contrast" min="-100" max="100" value="0" oninput="editImage()" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">🎨 Saturation</label>
                    <input type="range" id="saturation" min="-100" max="100" value="0" oninput="editImage()" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">🔥 Warmth</label>
                    <input type="range" id="warmth" min="-100" max="100" value="0" oninput="editImage()" class="w-full">
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex gap-3">
                <button onclick="reset()" class="flex-1 py-2 bg-gray-200 rounded font-bold hover:bg-gray-300">🔄 Reset</button>
                <button onclick="save()" class="flex-1 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700">💾 Save</button>
            </div>
        </div>
    </div>

    <script>
        let originalImg = null;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function loadImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                originalImg = new Image();
                originalImg.onload = function() {
                    resizeAndDraw();
                    document.getElementById('editor').classList.remove('hidden');
                };
                originalImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resizeAndDraw() {
            let w = originalImg.width, h = originalImg.height;
            if (w > 800) { h = (800/w)*h; w = 800; }
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(originalImg, 0, 0, w, h);
        }

        function editImage() {
            if (!originalImg) return;
            resizeAndDraw();
            
            const bright = parseInt(document.getElementById('brightness').value);
            const cont = parseInt(document.getElementById('contrast').value);
            const sat = parseInt(document.getElementById('saturation').value);
            const warm = parseInt(document.getElementById('warmth').value);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = data.data;

            for (let i = 0; i < pixels.length; i += 4) {
                let r = pixels[i], g = pixels[i+1], b = pixels[i+2];

                // Brightness
                r += bright; g += bright; b += bright;

                // Contrast
                if (cont !== 0) {
                    const f = (259 * (cont + 255)) / (255 * (259 - cont));
                    r = f * (r - 128) + 128;
                    g = f * (g - 128) + 128;
                    b = f * (b - 128) + 128;
                }

                // Saturation
                if (sat !== 0) {
                    const gray = 0.2989*r + 0.5870*g + 0.1140*b;
                    r = gray + (r - gray) * (1 + sat/100);
                    g = gray + (g - gray) * (1 + sat/100);
                    b = gray + (b - gray) * (1 + sat/100);
                }

                // Warmth
                if (warm !== 0) {
                    r += warm * 0.5;
                    b -= warm * 0.3;
                }

                pixels[i] = Math.max(0, Math.min(255, r));
                pixels[i+1] = Math.max(0, Math.min(255, g));
                pixels[i+2] = Math.max(0, Math.min(255, b));
            }

            ctx.putImageData(data, 0, 0);
        }

        function reset() {
            document.getElementById('brightness').value = 0;
            document.getElementById('contrast').value = 0;
            document.getElementById('saturation').value = 0;
            document.getElementById('warmth').value = 0;
            resizeAndDraw();
        }

        function save() {
            const link = document.createElement('a');
            link.download = 'edited-image.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }
    </script>
</body>
</html>
